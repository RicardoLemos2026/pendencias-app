<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pendências">
<meta name="theme-color" content="#0a0a0a">
<title>Pendências</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--sur:#141414;--sur2:#1e1e1e;
  --bd:#2a2a2a;--bd2:#333;
  --tx:#f0ede8;--tx2:#8a8580;--tx3:#555;
  --ac:#d4af6a;--ac2:#e8c98a;
  --red:#e05a4a;--ora:#d4924a;--grn:#5aad7a;
  --r:8px
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--bd);padding:env(safe-area-inset-top,0) 20px 0}
.hdr-in{display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ac2);letter-spacing:-0.02em}
.logo em{color:var(--tx3);font-style:italic;font-size:14px;margin-left:4px}
.hdr-btns{display:flex;gap:6px}
.ibtn{width:36px;height:36px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.ibtn:hover{background:var(--sur2);color:var(--tx)}
.ibtn.on{background:var(--ac);color:var(--bg);border-color:var(--ac)}

/* SYNC STATUS */
.sync{font-size:11px;color:var(--tx3);padding:4px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;min-height:24px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--tx3);flex-shrink:0}
.sync-dot.ok{background:var(--grn)}
.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:var(--ora);animation:pulse2 1s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border-bottom:1px solid var(--bd)}
.stat{background:var(--bg);padding:12px 8px;text-align:center}
.sn{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--ac2);line-height:1}
.sn.w{color:var(--ora)}
.sl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

/* TABS */
.tabs{padding:12px 20px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bd)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--tx2);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.on{background:var(--ac);color:var(--bg);border-color:var(--ac);font-weight:500}

/* PERSON FILTER */
.pf{padding:10px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.pf label{font-size:12px;color:var(--tx3);white-space:nowrap}
.pf select{flex:1;font-size:13px;padding:6px 10px}

/* FORM */
.form{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:10px}
.form-r1{display:flex;gap:8px}
.form-r2{display:flex;gap:8px;flex-wrap:wrap}
input,select{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--sur);border:1px solid var(--bd2);color:var(--tx);border-radius:var(--r);padding:9px 12px;outline:none;transition:border-color .15s}
input::placeholder{color:var(--tx3)}
input:focus,select:focus{border-color:var(--ac)}
select{cursor:pointer}
select option{background:var(--sur)}
.inp-txt{flex:1}
.inp-who{flex:1;min-width:110px}
.inp-dt{min-width:130px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4)}
.btn-add{padding:9px 18px;border-radius:var(--r);border:1px solid var(--ac);background:var(--ac);color:var(--bg);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-add:hover{background:var(--ac2)}
.btn-add:active{transform:scale(.97)}
.btn-mic{width:40px;height:40px;border-radius:50%;border:1px solid var(--bd2);background:transparent;color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-mic:hover{border-color:var(--ac);color:var(--ac)}
.btn-mic.on{background:var(--red);border-color:var(--red);color:white;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* LIST */
.list{padding:0 20px 40px}
.item{padding:14px 0;border-bottom:1px solid var(--bd);animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.item-row{display:flex;align-items:flex-start;gap:12px}
.chk{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bd2);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:10px}
.chk:hover{border-color:var(--ac)}
.chk.done{background:var(--grn);border-color:var(--grn);color:white}
.item-body{flex:1;min-width:0}
.item-txt{font-size:15px;color:var(--tx);line-height:1.4;word-break:break-word}
.item-txt.done{text-decoration:line-through;color:var(--tx3)}
.tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;padding:2px 9px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:.02em}
.t-trabalho{background:#1a2535;color:#6aabda;border:1px solid #1e3a55}
.t-delegada{background:#2a1e0a;color:#d4924a;border:1px solid #4a3010}
.t-projeto{background:#1e1a2e;color:#9a7ad5;border:1px solid #342a4e}
.t-pessoal{background:#0a2015;color:#5aad7a;border:1px solid #0e3520}
.t-cliente{background:#1e0f1a;color:#d47ab5;border:1px solid #3e1a32}
.t-who{background:var(--sur2);color:var(--tx2);border:1px solid var(--bd2)}
.t-dt{background:var(--sur2);color:var(--tx2);border:1px solid var(--bd2)}
.t-late{background:#2a0e0a;color:var(--red);border:1px solid #4a1e18}
.item-acts{display:flex;gap:4px;flex-shrink:0}
.abtn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;padding:0 3px;transition:color .15s;white-space:nowrap}
.abtn:hover{color:var(--ac)}
.abtn.del:hover{color:var(--red)}
.abtn.del{font-size:18px}

/* UPDATE FORM */
.upd-form{margin-top:10px;padding-left:32px;display:flex;gap:8px}
.upd-form input{flex:1;font-size:13px;padding:7px 10px}
.sbtn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--ac);background:transparent;color:var(--ac);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap}
.sbtn:hover{background:var(--ac);color:var(--bg)}
.cbtn{padding:7px 10px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--tx3);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}

/* EDIT FORM */
.edt-form{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.edt-r{display:flex;gap:8px;flex-wrap:wrap}
.edt-form input,.edt-form select{font-size:13px;padding:7px 10px}
.edt-txt{width:100%}
.edt-who{flex:1;min-width:100px}
.edt-dt{min-width:130px}
.edt-acts{display:flex;gap:6px}
.sv-btn{padding:7px 16px;border-radius:var(--r);border:1px solid var(--ac);background:var(--ac);color:var(--bg);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.sv-btn:hover{background:var(--ac2)}
.cx-btn{padding:7px 12px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--tx3);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}

/* HISTORY */
.hist{margin-top:6px;padding-left:32px}
.hist-tog{background:none;border:none;color:var(--tx3);font-size:11px;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px}
.hist-tog:hover{color:var(--tx2)}
.hist-list{border-left:1px solid var(--bd2);margin-left:4px;padding-left:12px;margin-top:4px}
.hist-e{display:flex;gap:8px;padding:5px 0;position:relative}
.hist-dot{width:6px;height:6px;border-radius:50%;background:var(--tx3);flex-shrink:0;margin-top:5px;margin-left:-15px}
.hist-txt{font-size:13px;color:var(--tx2);flex:1;line-height:1.4}
.hist-d{font-size:11px;color:var(--tx3);font-family:'DM Mono',monospace;flex-shrink:0;margin-top:1px}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--tx3);font-style:italic;font-family:'DM Serif Display',serif;font-size:16px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-in">
    <div class="logo">Pendências <em>/ ricardo</em></div>
    <div class="hdr-btns">
      <button class="ibtn" id="btn-form" title="Nova tarefa">＋</button>
      <button class="ibtn" id="btn-exp" title="Exportar backup">↓</button>
      <label class="ibtn" title="Importar backup" style="cursor:pointer">↑<input type="file" id="inp-imp" accept=".json" style="display:none"></label>
    </div>
  </div>
</div>

<div class="sync" id="sync-bar">
  <div class="sync-dot loading" id="sync-dot"></div>
  <span id="sync-txt">Conectando...</span>
</div>

<div class="stats" id="stats"></div>

<div class="tabs" id="tabs">
  <button class="tab on" data-f="abertas">Abertas</button>
  <button class="tab" data-f="trabalho">Trabalho</button>
  <button class="tab" data-f="delegada">Delegadas</button>
  <button class="tab" data-f="projeto">Projetos</button>
  <button class="tab" data-f="cliente">Clientes</button>
  <button class="tab" data-f="pessoal">Pessoal</button>
  <button class="tab" data-f="concluidas">Concluídas</button>
</div>

<div class="pf">
  <label>Filtrar por pessoa:</label>
  <select id="sel-who"><option value="">Todos</option></select>
</div>

<div class="form" id="form">
  <div class="form-r1">
    <input class="inp-txt" id="inp-txt" placeholder="O que está pendente?" autocomplete="off">
    <button class="btn-mic" id="btn-mic">🎤</button>
    <button class="btn-add" id="btn-add">Adicionar</button>
  </div>
  <div class="form-r2">
    <select id="inp-tipo">
      <option value="trabalho">Trabalho</option>
      <option value="delegada">Delegada</option>
      <option value="projeto">Projeto</option>
      <option value="cliente">Cliente</option>
      <option value="pessoal">Pessoal</option>
    </select>
    <input class="inp-who" id="inp-who" placeholder="Quem? / Cliente?" autocomplete="off">
    <input class="inp-dt" id="inp-dt" type="date">
  </div>
</div>

<div class="list" id="list"></div>

<script>
// ===== SUPABASE CONFIG =====
var SUPA_URL = 'https://yccqvlpunmwcpyrvurtr.supabase.co';
var SUPA_KEY = 'sb_publishable_5Wu2Z375PFMcN6wXu3oqeQ_v_xNrH2M';
var TABLE = 'pendencias';

// ===== STATE =====
var items = [];
var filter = 'abertas';
var filterWho = '';
var expanded = {};
var updOpen = {};
var edtOpen = {};

// ===== SUPABASE API =====
function supaHeaders() {
  return {
    'Content-Type': 'application/json',
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Prefer': 'return=representation'
  };
}

function setSyncStatus(status, msg) {
  var dot = document.getElementById('sync-dot');
  var txt = document.getElementById('sync-txt');
  dot.className = 'sync-dot ' + status;
  txt.textContent = msg;
}

async function loadFromSupabase() {
  setSyncStatus('loading', 'Carregando...');
  try {
    var res = await fetch(SUPA_URL + '/rest/v1/' + TABLE + '?order=criado_em.desc', {
      headers: supaHeaders()
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    items = data.map(function(row) {
      var d = typeof row.dados === 'string' ? JSON.parse(row.dados) : row.dados;
      return Object.assign({ hist: [] }, d, { _dbid: row.id });
    });
    setSyncStatus('ok', 'Sincronizado · ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}));
    render();
  } catch(e) {
    setSyncStatus('err', 'Erro de conexão');
    // fallback to localStorage
    try { items = JSON.parse(localStorage.getItem('pend_v8') || '[]'); } catch(x) { items = []; }
    render();
  }
}

async function saveToSupabase(item) {
  var payload = { dados: JSON.stringify(item) };
  try {
    if (item._dbid) {
      // update
      await fetch(SUPA_URL + '/rest/v1/' + TABLE + '?id=eq.' + item._dbid, {
        method: 'PATCH',
        headers: supaHeaders(),
        body: JSON.stringify(payload)
      });
    } else {
      // insert
      var res = await fetch(SUPA_URL + '/rest/v1/' + TABLE, {
        method: 'POST',
        headers: supaHeaders(),
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        var rows = await res.json();
        if (rows && rows[0]) item._dbid = rows[0].id;
      }
    }
    setSyncStatus('ok', 'Salvo · ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('err', 'Erro ao salvar');
  }
}

async function deleteFromSupabase(item) {
  if (!item._dbid) return;
  try {
    await fetch(SUPA_URL + '/rest/v1/' + TABLE + '?id=eq.' + item._dbid, {
      method: 'DELETE',
      headers: supaHeaders()
    });
    setSyncStatus('ok', 'Removido · ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('err', 'Erro ao remover');
  }
}

// ===== HELPERS =====
function isLate(p) {
  if (!p) return false;
  return new Date(p + 'T23:59:59') < new Date();
}
function fmtD(p) {
  if (!p) return '';
  return new Date(p + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'});
}
function fmtTS(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
var TL = {trabalho:'trabalho',delegada:'delegada',projeto:'projeto',pessoal:'pessoal',cliente:'cliente'};

function getPessoas() {
  var s = {};
  items.forEach(function(i) { if (i.who) s[i.who] = 1; });
  return Object.keys(s).sort();
}

function renderStats() {
  var ab = items.filter(function(i){return !i.done;});
  var late = ab.filter(function(i){return isLate(i.prazo);});
  var del = ab.filter(function(i){return i.tipo==='delegada';});
  var dn = items.filter(function(i){return i.done;});
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="sn">'+ab.length+'</div><div class="sl">abertas</div></div>' +
    '<div class="stat"><div class="sn">'+del.length+'</div><div class="sl">delegadas</div></div>' +
    '<div class="stat"><div class="sn'+(late.length>0?' w':'')+'" >'+late.length+'</div><div class="sl">atrasadas</div></div>' +
    '<div class="stat"><div class="sn">'+dn.length+'</div><div class="sl">feitas</div></div>';
}

function renderWhoFilter() {
  var sel = document.getElementById('sel-who');
  var cur = sel.value;
  var ps = getPessoas();
  sel.innerHTML = '<option value="">Todos</option>' + ps.map(function(p){
    return '<option value="'+p+'"'+(p===cur?' selected':'')+'>'+p+'</option>';
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderItem(item) {
  var late = isLate(item.prazo);
  var ds = fmtD(item.prazo);
  var hasH = item.hist && item.hist.length > 0;
  var isExp = expanded[item.id];
  var isUpd = updOpen[item.id];
  var isEdt = edtOpen[item.id];

  var tags = '<span class="tag t-'+item.tipo+'">'+TL[item.tipo]+'</span>';
  if (item.who) tags += '<span class="tag t-who">'+esc(item.who)+'</span>';
  if (ds) tags += '<span class="tag '+(late?'t-late':'t-dt')+'">'+(late?'⚠ ':'')+ds+'</span>';

  var histHTML = '';
  if (hasH) {
    histHTML = '<div class="hist"><button class="hist-tog" onclick="toggleH(\''+item.id+'\')">'+
      (isExp?'▲':'▼')+' '+item.hist.length+' atualização'+(item.hist.length>1?'ões':'')+'</button>';
    if (isExp) {
      histHTML += '<div class="hist-list">'+item.hist.slice().reverse().map(function(h){
        return '<div class="hist-e"><div class="hist-dot"></div><div class="hist-txt">'+esc(h.txt)+'</div><div class="hist-d">'+fmtTS(h.dt)+'</div></div>';
      }).join('')+'</div>';
    }
    histHTML += '</div>';
  }

  var updHTML = isUpd && !isEdt ? '<div class="upd-form"><input id="ui-'+item.id+'" placeholder="O que aconteceu?" autocomplete="off"><button class="sbtn" onclick="saveUpd(\''+item.id+'\')">Salvar</button><button class="cbtn" onclick="closeUpd(\''+item.id+'\')">✕</button></div>' : '';

  var edtHTML = isEdt ? '<div class="edt-form">'+
    '<input class="edt-txt" id="et-'+item.id+'" value="'+esc(item.txt)+'" autocomplete="off">'+
    '<div class="edt-r">'+
    '<select id="eti-'+item.id+'">'+
      ['trabalho','delegada','projeto','cliente','pessoal'].map(function(t){
        return '<option value="'+t+'"'+(item.tipo===t?' selected':'')+'>'+TL[t]+'</option>';
      }).join('')+
    '</select>'+
    '<input class="edt-who" id="ew-'+item.id+'" value="'+esc(item.who||'')+'" placeholder="Quem? / Cliente?" autocomplete="off">'+
    '<input class="edt-dt" id="ed-'+item.id+'" type="date" value="'+(item.prazo||'')+'">'+
    '</div>'+
    '<div class="edt-acts"><button class="sv-btn" onclick="saveEdt(\''+item.id+'\')">Salvar edição</button><button class="cx-btn" onclick="closeEdt(\''+item.id+'\')">Cancelar</button></div>'+
    '</div>' : '';

  var acts = !item.done && !isEdt ?
    '<div class="item-acts">'+
    '<button class="abtn" onclick="openEdt(\''+item.id+'\')">✎</button>'+
    '<button class="abtn" onclick="openUpd(\''+item.id+'\')">+ upd</button>'+
    '<button class="abtn del" onclick="delItem(\''+item.id+'\')">×</button>'+
    '</div>' :
    '<div class="item-acts"><button class="abtn del" onclick="delItem(\''+item.id+'\')">×</button></div>';

  return '<div class="item" id="it-'+item.id+'">'+
    '<div class="item-row">'+
    '<div class="chk'+(item.done?' done':'')+'" onclick="toggleDone(\''+item.id+'\')">'+(item.done?'✓':'')+'</div>'+
    '<div class="item-body">'+
    '<div class="item-txt'+(item.done?' done':'')+'">'+esc(item.txt)+'</div>'+
    '<div class="tags">'+tags+'</div>'+
    (!isEdt ? histHTML : '')+
    edtHTML+
    updHTML+
    '</div>'+
    acts+
    '</div></div>';
}

function renderList() {
  var el = document.getElementById('list');
  var vis;
  if (filter === 'abertas') vis = items.filter(function(i){return !i.done;});
  else if (filter === 'concluidas') vis = items.filter(function(i){return i.done;});
  else vis = items.filter(function(i){return !i.done && i.tipo===filter;});
  if (filterWho) vis = vis.filter(function(i){return i.who===filterWho;});
  if (!vis.length) { el.innerHTML = '<p class="empty">Nenhuma pendência aqui.</p>'; return; }
  el.innerHTML = vis.map(renderItem).join('');
  Object.keys(updOpen).forEach(function(id){
    if (updOpen[id]) { var inp = document.getElementById('ui-'+id); if (inp) inp.focus(); }
  });
  Object.keys(edtOpen).forEach(function(id){
    if (edtOpen[id]) { var inp = document.getElementById('et-'+id); if (inp) { inp.focus(); inp.select(); } }
  });
}

function render() { renderStats(); renderWhoFilter(); renderList(); }

// ===== ACTIONS =====
function toggleDone(id) {
  var it = items.find(function(i){return i.id===id;});
  if (it) { it.done = !it.done; render(); saveToSupabase(it); }
}
async function delItem(id) {
  if (!confirm('Remover esta pendência?')) return;
  var it = items.find(function(i){return i.id===id;});
  items = items.filter(function(i){return i.id!==id;});
  render();
  if (it) await deleteFromSupabase(it);
}
function toggleH(id) { expanded[id] = !expanded[id]; renderList(); }
function openUpd(id) { updOpen[id] = true; edtOpen[id] = false; renderList(); }
function closeUpd(id) { delete updOpen[id]; renderList(); }
function saveUpd(id) {
  var inp = document.getElementById('ui-'+id);
  var txt = inp ? inp.value.trim() : '';
  if (!txt) return;
  var it = items.find(function(i){return i.id===id;});
  if (!it) return;
  it.hist.push({txt:txt, dt:new Date().toISOString()});
  delete updOpen[id];
  expanded[id] = true;
  render();
  saveToSupabase(it);
}
function openEdt(id) { edtOpen[id] = true; updOpen[id] = false; renderList(); }
function closeEdt(id) { delete edtOpen[id]; renderList(); }
function saveEdt(id) {
  var txt = document.getElementById('et-'+id);
  var tip = document.getElementById('eti-'+id);
  var who = document.getElementById('ew-'+id);
  var dt = document.getElementById('ed-'+id);
  if (!txt || !txt.value.trim()) return;
  var it = items.find(function(i){return i.id===id;});
  if (!it) return;
  it.txt = txt.value.trim();
  it.tipo = tip ? tip.value : it.tipo;
  it.who = who ? who.value.trim() : '';
  it.prazo = dt ? dt.value : '';
  delete edtOpen[id];
  render();
  saveToSupabase(it);
}

// ===== ADD =====
async function addItem() {
  var txt = document.getElementById('inp-txt').value.trim();
  if (!txt) return;
  var newItem = {
    id: Date.now().toString(36) + Math.random().toString(36).substr(2,5),
    txt: txt,
    tipo: document.getElementById('inp-tipo').value,
    who: document.getElementById('inp-who').value.trim(),
    prazo: document.getElementById('inp-dt').value,
    done: false,
    hist: [],
    dt: new Date().toISOString()
  };
  items.unshift(newItem);
  document.getElementById('inp-txt').value = '';
  document.getElementById('inp-who').value = '';
  document.getElementById('inp-dt').value = '';
  render();
  document.getElementById('inp-txt').focus();
  await saveToSupabase(newItem);
}

document.getElementById('btn-add').addEventListener('click', addItem);
document.getElementById('inp-txt').addEventListener('keydown', function(e){ if (e.key==='Enter') addItem(); });

// ===== TOGGLE FORM =====
document.getElementById('btn-form').addEventListener('click', function(){
  var f = document.getElementById('form');
  var hidden = f.style.display === 'none';
  f.style.display = hidden ? '' : 'none';
  document.getElementById('btn-form').classList.toggle('on', hidden);
});

// ===== EXPORT =====
document.getElementById('btn-exp').addEventListener('click', function(){
  var data = {pendencias: items, em: new Date().toISOString(), v: 'v8'};
  var blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'pendencias-' + new Date().toLocaleDateString('pt-BR').replace(/\//g,'-') + '.json';
  a.click();
  URL.revokeObjectURL(url);
});

// ===== IMPORT =====
document.getElementById('inp-imp').addEventListener('change', function(e){
  var file = e.target.files[0];
  if (!file) return;
  var r = new FileReader();
  r.onload = async function(ev){
    try {
      var data = JSON.parse(ev.target.result);
      var imp = data.pendencias || data;
      if (!Array.isArray(imp)) { alert('Arquivo inválido.'); return; }
      if (!confirm('Importar '+imp.length+' pendências? Substitui os dados atuais.')) return;
      items = imp.map(function(i){ return Object.assign({hist:[]}, i); });
      render();
      // save all to supabase
      setSyncStatus('loading', 'Importando...');
      for (var i = 0; i < items.length; i++) {
        await saveToSupabase(items[i]);
      }
      setSyncStatus('ok', 'Importado com sucesso!');
      alert('Importado! '+imp.length+' pendências carregadas.');
    } catch(err) { alert('Erro ao ler o arquivo.'); }
  };
  r.readAsText(file);
  e.target.value = '';
});

// ===== VOICE =====
var recog = null;
var listening = false;
var micBtn = document.getElementById('btn-mic');
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recog = new SR();
  recog.lang = 'pt-BR';
  recog.continuous = false;
  recog.interimResults = true;
  recog.onstart = function(){ listening=true; micBtn.classList.add('on'); document.getElementById('inp-txt').placeholder='Ouvindo...'; };
  recog.onresult = function(e){ document.getElementById('inp-txt').value = Array.from(e.results).map(function(r){return r[0].transcript;}).join(''); };
  recog.onend = function(){ listening=false; micBtn.classList.remove('on'); document.getElementById('inp-txt').placeholder='O que está pendente?'; };
  recog.onerror = function(e){ listening=false; micBtn.classList.remove('on'); document.getElementById('inp-txt').placeholder='O que está pendente?'; if(e.error==='not-allowed') alert('Permita o microfone nas configurações.'); };
  micBtn.addEventListener('click', function(){ if(listening){recog.stop();}else{document.getElementById('inp-txt').value='';recog.start();} });
} else { micBtn.style.display='none'; }

loadFromSupabase();
