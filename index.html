<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pendências">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon.png">
<title>Pendências</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--sur:#141414;--sur2:#1e1e1e;
  --bd:#2a2a2a;--bd2:#333;
  --tx:#f0ede8;--tx2:#8a8580;--tx3:#555;
  --ac:#d4af6a;--ac2:#e8c98a;
  --red:#e05a4a;--ora:#d4924a;--grn:#5aad7a;
  --r:8px
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--bd);padding:env(safe-area-inset-top,0) 20px 0}
.hdr-in{display:flex;align-items:center;justify-content:space-between;height:56px}
.logo img{height:36px;width:auto;display:block}
.hdr-btns{display:flex;gap:6px}
.ibtn{width:36px;height:36px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.ibtn:hover{background:var(--sur2);color:var(--tx)}
.ibtn.on{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border-bottom:1px solid var(--bd)}
.stat{background:var(--bg);padding:12px 8px;text-align:center}
.sn{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--ac2);line-height:1}
.sn.w{color:var(--ora)}
.sl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.sync-bar{padding:6px 20px;background:var(--sur);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);flex-shrink:0}
.notif{padding:10px 20px;background:#2a1a0a;border-bottom:1px solid #4a3010;display:none;align-items:center;gap:10px;font-size:13px;color:#d4924a;cursor:pointer}
.tabs{padding:12px 20px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bd)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--tx2);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.on{background:var(--ac);color:var(--bg);border-color:var(--ac);font-weight:500}
.pf{padding:10px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.pf label{font-size:12px;color:var(--tx3);white-space:nowrap}
.toolbar{padding:10px 20px;border-bottom:1px solid var(--bd);display:flex;gap:8px}
.toolbar input{flex:1;font-size:13px;padding:7px 10px}
.toolbar select{font-size:13px;padding:7px 10px}
input,select{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--sur);border:1px solid var(--bd2);color:var(--tx);border-radius:var(--r);padding:9px 12px;outline:none;transition:border-color .15s}
input::placeholder{color:var(--tx3)}
input:focus,select:focus{border-color:var(--ac)}
select{cursor:pointer}
select option{background:var(--sur)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4)}
.form{padding:16px 20px;border-bottom:1px solid var(--bd);flex-direction:column;gap:10px;display:none}
.form.open{display:flex}
.form-r1{display:flex;gap:8px}
.form-r2{display:flex;gap:8px;flex-wrap:wrap}
.inp-txt{flex:1}
.inp-who{flex:1;min-width:110px}
.inp-dt{min-width:130px}
.btn-add{padding:9px 18px;border-radius:var(--r);border:1px solid var(--ac);background:var(--ac);color:var(--bg);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-add:hover{background:var(--ac2)}
.btn-mic{width:40px;height:40px;border-radius:50%;border:1px solid var(--bd2);background:transparent;color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-mic:hover{border-color:var(--ac);color:var(--ac)}
.btn-mic.on{background:var(--red);border-color:var(--red);color:white;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.list{padding:0 20px 120px}
.item{padding:14px 0;border-bottom:1px solid var(--bd)}
.item-row{display:flex;align-items:flex-start;gap:12px}
.chk{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bd2);background:transparent;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:10px}
.chk:hover{border-color:var(--ac)}
.chk.done{background:var(--grn);border-color:var(--grn);color:white}
.item-body{flex:1;min-width:0}
.item-txt{font-size:15px;color:var(--tx);line-height:1.4;word-break:break-word}
.item-txt.done{text-decoration:line-through;color:var(--tx3)}
.tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;padding:2px 9px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:.02em;font-weight:500}
.t-trabalho{background:#0d2040;color:#5aabf0;border:1px solid #1a4080}
.t-delegada{background:#2e1a00;color:#f0a030;border:1px solid #5a3800}
.t-projeto{background:#1a1040;color:#a080f0;border:1px solid #3a2080}
.t-pessoal{background:#062010;color:#40c070;border:1px solid #104030}
.t-cliente{background:#280a20;color:#f070c0;border:1px solid #5a1a50}
.t-who{background:var(--sur2);color:var(--tx2);border:1px solid var(--bd2)}
.t-dt{background:var(--sur2);color:var(--tx2);border:1px solid var(--bd2)}
.t-late{background:#2a0e0a;color:var(--red);border:1px solid #4a1e18}
.item-acts{display:flex;gap:4px;flex-shrink:0;align-items:flex-start;padding-top:2px}
.abtn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;padding:2px 4px;transition:color .15s;white-space:nowrap;line-height:1.4}
.abtn:hover{color:var(--ac)}
.abtn.del{font-size:18px;line-height:1}
.abtn.del:hover{color:var(--red)}
.attachments{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.attach-item{display:flex;align-items:center;gap:6px;font-size:12px}
.attach-item a{color:var(--ac);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-item a:hover{text-decoration:underline}
.attach-del{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.attach-del:hover{color:var(--red)}
.hist{margin-top:6px}
.hist-tog{background:none;border:none;color:var(--tx3);font-size:11px;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px}
.hist-tog:hover{color:var(--tx2)}
.hist-list{border-left:1px solid var(--bd2);margin-left:4px;padding-left:12px;margin-top:4px}
.hist-e{display:flex;gap:8px;padding:5px 0}
.hist-dot{width:6px;height:6px;border-radius:50%;background:var(--tx3);flex-shrink:0;margin-top:5px;margin-left:-15px}
.hist-txt{font-size:13px;color:var(--tx2);flex:1;line-height:1.4}
.hist-d{font-size:11px;color:var(--tx3);font-family:'DM Mono',monospace;flex-shrink:0;margin-top:2px}
.inline-form{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.inline-form input,.inline-form select{font-size:13px;padding:7px 10px}
.inline-row{display:flex;gap:8px;flex-wrap:wrap}
.inline-actions{display:flex;gap:6px}
.sbtn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--ac);background:transparent;color:var(--ac);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.sbtn:hover{background:var(--ac);color:var(--bg)}
.sv-btn{padding:7px 16px;border-radius:var(--r);border:1px solid var(--ac);background:var(--ac);color:var(--bg);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.sv-btn:hover{background:var(--ac2)}
.cbtn,.cx-btn{padding:7px 10px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--tx3);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.file-lbl{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--tx2);cursor:pointer;background:var(--sur);white-space:nowrap}
.prev-file{font-size:12px;color:var(--ac)}
.empty{text-align:center;padding:48px 20px;color:var(--tx3);font-style:italic;font-family:'DM Serif Display',serif;font-size:16px}
.bar{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bd2);padding:12px 20px env(safe-area-inset-bottom,12px);display:flex;gap:8px}
.bbtn{flex:1;padding:12px 16px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--sur2);color:var(--tx);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.bbtn:hover{border-color:var(--ac);color:var(--ac)}
.aip{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.aip.open{transform:translateY(0)}
.aip-hdr{padding:env(safe-area-inset-top,0) 20px 0;border-bottom:1px solid var(--bd)}
.aip-hdr-in{height:56px;display:flex;align-items:center;justify-content:space-between}
.aip-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--ac2)}
.aip-close{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;padding:4px}
.aip-body{flex:1;overflow-y:auto;padding:20px}
.aip-loading{display:flex;align-items:center;gap:10px;color:var(--tx2);font-size:14px;padding:20px 0}
.spin{width:18px;height:18px;border:2px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-msg{font-size:15px;line-height:1.7;color:var(--tx);white-space:pre-wrap}
.ai-msg strong{color:var(--ac);font-weight:500}
.usr-msg{font-size:14px;color:var(--tx2);padding:8px 0;border-bottom:1px solid var(--bd);margin-bottom:8px}
.aip-inp-area{padding:12px 20px env(safe-area-inset-bottom,12px);border-top:1px solid var(--bd);display:flex;gap:8px}
.aip-inp-area input{flex:1;padding:10px 14px}
.snd-btn{padding:10px 18px;border-radius:var(--r);border:1px solid var(--ac);background:var(--ac);color:var(--bg);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-in">
    <div class="logo"><img id="logo-img" alt="Ricardo Lemos"></div>
    <div class="hdr-btns">
      <button class="ibtn" id="btn-form" title="Nova tarefa">＋</button>
      <button class="ibtn" id="btn-exp" title="Exportar backup">↓</button>
      <label class="ibtn" title="Importar backup" style="cursor:pointer">↑<input type="file" id="inp-imp" accept=".json" style="display:none"></label>
    </div>
  </div>
</div>
<div class="stats" id="stats"></div>
<div class="sync-bar"><span class="sync-dot"></span><span id="sync-status">Conectando...</span></div>
<div class="notif" id="notif" onclick="goHoje()"></div>
<div class="tabs" id="tabs">
  <button class="tab on" data-f="hoje">Hoje</button>
  <button class="tab" data-f="todas">Todas</button>
  <button class="tab" data-f="trabalho">Trabalho</button>
  <button class="tab" data-f="delegada">Delegadas</button>
  <button class="tab" data-f="projeto">Projetos</button>
  <button class="tab" data-f="cliente">Clientes</button>
  <button class="tab" data-f="pessoal">Pessoal</button>
  <button class="tab" data-f="concluidas">Concluídas</button>
</div>
<div class="pf">
  <label>Filtrar por pessoa:</label>
  <select id="sel-who"><option value="">Todos</option></select>
</div>
<div class="toolbar">
  <input id="s-inp" placeholder="🔍 Buscar..." autocomplete="off">
  <select id="s-sort">
    <option value="rec">Mais recentes</option>
    <option value="prazo">Por prazo</option>
    <option value="tipo">Por categoria</option>
    <option value="late">Atrasadas primeiro</option>
  </select>
</div>
<div class="form" id="form">
  <div class="form-r1">
    <input class="inp-txt" id="inp-txt" placeholder="O que está pendente?" autocomplete="off">
    <button class="btn-mic" id="btn-mic">🎤</button>
    <button class="btn-add" id="btn-add">Adicionar</button>
  </div>
  <div class="form-r2">
    <select id="inp-tipo">
      <option value="trabalho">Trabalho</option>
      <option value="delegada">Delegada</option>
      <option value="projeto">Projeto</option>
      <option value="cliente">Cliente</option>
      <option value="pessoal">Pessoal</option>
    </select>
    <input class="inp-who" id="inp-who" placeholder="Quem? / Cliente?" autocomplete="off">
    <input class="inp-dt" id="inp-dt" type="date" placeholder="Data limite">
  </div>
</div>
<div class="list" id="list"></div>
<div class="bar">
  <button class="bbtn" id="btn-brief">☀ Briefing do dia</button>
  <button class="bbtn" id="btn-asst" style="flex:0;padding:12px 14px">✦ Assistente</button>
</div>
<div class="aip" id="aip">
  <div class="aip-hdr">
    <div class="aip-hdr-in">
      <div class="aip-title" id="aip-title">Briefing</div>
      <button class="aip-close" id="aip-close">✕</button>
    </div>
  </div>
  <div class="aip-body" id="aip-body"></div>
  <div class="aip-inp-area">
    <input id="aip-inp" placeholder="Pergunte ou atualize uma pendência...">
    <button class="snd-btn" id="btn-snd">→</button>
  </div>
</div>

var syncing=false;

async function load(){
  var binId=localStorage.getItem(BIN_KEY);
  if(!binId){
    // First time — create bin
    try{
      setSyncStatus('Configurando...');
      var res=await fetch('https://api.jsonbin.io/v3/b',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Bin-Name':'pendencias-ricardo'},
        body:JSON.stringify([])
      });
      var data=await res.json();
      binId=data.metadata.id;
      localStorage.setItem(BIN_KEY,binId);
      items=[];
      setSyncStatus('Pronto');
    }catch(e){
      setSyncStatus('Sem conexão');
      try{items=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e2){items=[];}
    }
  } else {
    // Load from cloud
    try{
      setSyncStatus('Carregando...');
      var res=await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest',{
        headers:{'X-Master-Key':API_KEY}
      });
      var data=await res.json();
      items=Array.isArray(data.record)?data.record:[];
      localStorage.setItem(KEY,JSON.stringify(items));
      setSyncStatus('Sincronizado · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
    }catch(e){
      setSyncStatus('Sem conexão — usando dados locais');
      try{items=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e2){items=[];}
    }
  }
  items.forEach(function(i){if(!i.hist)i.hist=[];if(!i.att)i.att=[];});
}

function setSyncStatus(msg){
  var el=document.getElementById('sync-status');
  if(el)el.textContent=msg;
}

async function save(){
  try{localStorage.setItem(KEY,JSON.stringify(items));}catch(e){}
  var binId=localStorage.getItem(BIN_KEY);
  if(!binId)return;
  if(syncing)return;
  syncing=true;
  setSyncStatus('Salvando...');
  try{
    await fetch('https://api.jsonbin.io/v3/b/'+binId,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(items)
    });
    setSyncStatus('Sincronizado · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    setSyncStatus('Salvo localmente');
  }
  syncing=false;
}
function isLate(p){if(!p)return false;return new Date(p+'T23:59:59')<new Date();}
function isToday(p){if(!p)return false;var d=new Date(p+'T23:59:59'),n=new Date();n.setHours(23,59,59,0);return d<=n;}
function fmtD(p){if(!p)return '';return new Date(p+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}
function fmtTS(iso){var d=new Date(iso);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}

function goHoje(){
  filter='hoje';
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelector('[data-f="hoje"]').classList.add('on');
  renderList();
}

function renderStats(){
  var ab=items.filter(function(i){return !i.done;});
  var late=ab.filter(function(i){return isLate(i.prazo);});
  var urg=ab.filter(function(i){return isToday(i.prazo);});
  var dn=items.filter(function(i){return i.done;});
  var notif=document.getElementById('notif');
  if(urg.length>0){
    notif.style.display='flex';
    var parts=[];
    var lateN=late.length;
    var todayN=urg.length-lateN;
    if(lateN>0)parts.push(lateN+' atrasada'+(lateN>1?'s':''));
    if(todayN>0)parts.push(todayN+' vence hoje');
    notif.textContent='⚠ '+parts.join(' · ')+' — toque para ver';
  } else {
    notif.style.display='none';
  }
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="sn'+(urg.length>0?' w':'')+'">'+urg.length+'</div><div class="sl">hoje</div></div>'+
    '<div class="stat"><div class="sn">'+ab.length+'</div><div class="sl">todas</div></div>'+
    '<div class="stat"><div class="sn'+(late.length>0?' w':'')+'">'+late.length+'</div><div class="sl">atrasadas</div></div>'+
    '<div class="stat"><div class="sn">'+dn.length+'</div><div class="sl">feitas</div></div>';
}

function renderWho(){
  var sel=document.getElementById('sel-who');
  var cur=sel.value;
  var s={};items.forEach(function(i){if(i.who)s[i.who]=1;});
  var ps=Object.keys(s).sort();
  sel.innerHTML='<option value="">Todos</option>'+ps.map(function(p){return '<option value="'+esc(p)+'"'+(p===cur?' selected':'')+'>'+esc(p)+'</option>';}).join('');
}

function renderItem(item){
  var late=isLate(item.prazo);
  var ds=fmtD(item.prazo);
  var isE=openEdt[item.id];
  var isU=openUpd[item.id];
  var isX=expH[item.id];

  var tags='<span class="tag t-'+item.tipo+'">'+TL[item.tipo]+'</span>';
  if(item.who)tags+='<span class="tag t-who">'+esc(item.who)+'</span>';
  if(ds)tags+='<span class="tag '+(late?'t-late':'t-dt')+'">'+(late?'⚠ ':'')+ds+'</span>';

  var attHTML='';
  if(item.att&&item.att.length){
    attHTML='<div class="attachments">'+item.att.map(function(a,i){
      return '<div class="attach-item"><span>'+(a.type==='file'?'📎':'🔗')+'</span><a href="'+esc(a.url)+'" target="_blank">'+esc(a.name)+'</a><button class="attach-del" onclick="delAtt(\''+item.id+'\','+i+')">×</button></div>';
    }).join('')+'</div>';
  }

  var histHTML='';
  if(item.hist&&item.hist.length){
    histHTML='<div class="hist"><button class="hist-tog" onclick="toggleH(\''+item.id+'\')">'+
      (isX?'▲':'▼')+' '+item.hist.length+' atualização'+(item.hist.length>1?'ões':'')+'</button>';
    if(isX){
      histHTML+='<div class="hist-list">'+item.hist.slice().reverse().map(function(h){
        return '<div class="hist-e"><div class="hist-dot"></div><div class="hist-txt">'+esc(h.txt)+'</div><div class="hist-d">'+fmtTS(h.dt)+'</div></div>';
      }).join('')+'</div>';
    }
    histHTML+='</div>';
  }

  var updHTML='';
  if(isU&&!isE){
    updHTML='<div class="inline-form">'+
      '<div class="inline-row">'+
      '<input id="ui-'+item.id+'" placeholder="O que aconteceu?" autocomplete="off" style="flex:1">'+
      '<input id="ud-'+item.id+'" type="date" placeholder="Novo prazo" style="max-width:130px">'+
      '</div>'+
      '<div class="inline-row">'+
      '<input id="ul-'+item.id+'" placeholder="🔗 Cole um link (opcional)" autocomplete="off" style="flex:1">'+
      '<label class="file-lbl">📎 Arquivo<input type="file" style="display:none" onchange="handleFile(\''+item.id+'\',this)"></label>'+
      '</div>'+
      '<div id="uprev-'+item.id+'" class="prev-file"></div>'+
      '<div class="inline-actions">'+
      '<button class="sbtn" onclick="saveUpd(\''+item.id+'\')">Salvar</button>'+
      '<button class="cbtn" onclick="closeU(\''+item.id+'\')">Cancelar</button>'+
      '</div></div>';
  }

  var edtHTML='';
  if(isE){
    edtHTML='<div class="inline-form">'+
      '<input id="et-'+item.id+'" value="'+esc(item.txt)+'" autocomplete="off" style="width:100%">'+
      '<div class="inline-row">'+
      '<select id="eti-'+item.id+'">'+
        ['trabalho','delegada','projeto','cliente','pessoal'].map(function(t){
          return '<option value="'+t+'"'+(item.tipo===t?' selected':'')+'>'+TL[t]+'</option>';
        }).join('')+
      '</select>'+
      '<input id="ew-'+item.id+'" value="'+esc(item.who||'')+'" placeholder="Quem? / Cliente?" autocomplete="off" style="flex:1">'+
      '<input id="ed-'+item.id+'" type="date" value="'+(item.prazo||'')+'" style="max-width:130px">'+
      '</div>'+
      '<div class="inline-actions">'+
      '<button class="sv-btn" onclick="saveEdt(\''+item.id+'\')">Salvar edição</button>'+
      '<button class="cx-btn" onclick="closeE(\''+item.id+'\')">Cancelar</button>'+
      '</div></div>';
  }

  var acts='<div class="item-acts">';
  if(!item.done&&!isE){
    acts+='<button class="abtn" onclick="openE(\''+item.id+'\')">✎</button>';
    acts+='<button class="abtn" onclick="openU(\''+item.id+'\')">+upd</button>';
  }
  acts+='<button class="abtn del" onclick="delItem(\''+item.id+'\')">×</button>';
  acts+='</div>';

  return '<div class="item" id="it-'+item.id+'">'+
    '<div class="item-row">'+
    '<div class="chk'+(item.done?' done':'')+'" onclick="toggleDone(\''+item.id+'\')">'+(item.done?'✓':'')+'</div>'+
    '<div class="item-body">'+
    '<div class="item-txt'+(item.done?' done':'')+'">'+esc(item.txt)+'</div>'+
    '<div class="tags">'+tags+'</div>'+
    attHTML+histHTML+updHTML+edtHTML+
    '</div>'+acts+
    '</div></div>';
}

function getVis(){
  var vis;
  var hj=new Date();hj.setHours(23,59,59,0);
  if(filter==='hoje')vis=items.filter(function(i){return !i.done&&i.prazo&&new Date(i.prazo+'T23:59:59')<=hj;});
  else if(filter==='todas')vis=items.filter(function(i){return !i.done;});
  else if(filter==='concluidas')vis=items.filter(function(i){return i.done;});
  else vis=items.filter(function(i){return !i.done&&i.tipo===filter;});
  if(fWho)vis=vis.filter(function(i){return i.who===fWho;});
  if(sQ){var q=sQ.toLowerCase();vis=vis.filter(function(i){return i.txt.toLowerCase().includes(q)||(i.who&&i.who.toLowerCase().includes(q));});}
  if(sSort==='prazo')vis.sort(function(a,b){if(!a.prazo&&!b.prazo)return 0;if(!a.prazo)return 1;if(!b.prazo)return -1;return a.prazo>b.prazo?1:-1;});
  else if(sSort==='tipo'){var ord={trabalho:0,delegada:1,projeto:2,cliente:3,pessoal:4};vis.sort(function(a,b){return(ord[a.tipo]||9)-(ord[b.tipo]||9);});}
  else if(sSort==='late')vis.sort(function(a,b){return(isLate(a.prazo)?0:1)-(isLate(b.prazo)?0:1);});
  return vis;
}

function renderList(){
  var el=document.getElementById('list');
  var vis=getVis();
  if(!vis.length){el.innerHTML='<p class="empty">Nenhuma pendência aqui.</p>';return;}
  el.innerHTML=vis.map(renderItem).join('');
  // restore focus on open forms
  Object.keys(openUpd).forEach(function(id){if(openUpd[id]){var i=document.getElementById('ui-'+id);if(i)i.focus();}});
  Object.keys(openEdt).forEach(function(id){if(openEdt[id]){var i=document.getElementById('et-'+id);if(i){i.focus();i.select();}}});
}

function render(){renderStats();renderWho();renderList();}

// ITEM ACTIONS
function toggleDone(id){var it=items.find(function(i){return i.id===id;});if(it){it.done=!it.done;save();render();}}
function delItem(id){if(!confirm('Remover?'))return;items=items.filter(function(i){return i.id!==id;});save();render();}
function toggleH(id){expH[id]=!expH[id];renderList();}
function openU(id){openUpd[id]=true;openEdt[id]=false;renderList();}
function closeU(id){delete openUpd[id];delete pendFile[id];renderList();}
function openE(id){openEdt[id]=true;openUpd[id]=false;renderList();}
function closeE(id){delete openEdt[id];renderList();}

function handleFile(id,inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    pendFile[id]={name:f.name,url:e.target.result,type:'file'};
    var p=document.getElementById('uprev-'+id);
    if(p)p.textContent='📎 '+f.name;
  };
  r.readAsDataURL(f);
}

function delAtt(id,idx){
  var it=items.find(function(i){return i.id===id;});
  if(!it)return;
  it.att.splice(idx,1);
  save();renderList();
}

function saveUpd(id){
  var inp=document.getElementById('ui-'+id);
  var txt=inp?inp.value.trim():'';
  if(!txt)return;
  var it=items.find(function(i){return i.id===id;});
  if(!it)return;
  var nd=document.getElementById('ud-'+id);
  var histTxt=txt;
  if(nd&&nd.value){
    var old=it.prazo?'(antes: '+fmtD(it.prazo)+')':'';
    it.prazo=nd.value;
    histTxt=txt+' — novo prazo: '+fmtD(nd.value)+' '+old;
  }
  it.hist.push({txt:histTxt,dt:new Date().toISOString()});
  var lnk=document.getElementById('ul-'+id);
  if(lnk&&lnk.value.trim()){
    var url=lnk.value.trim();
    if(!url.startsWith('http'))url='https://'+url;
    var nm=url.replace(/^https?:\/\//,'').split('/')[0];
    it.att.push({name:nm,url:url,type:'link'});
  }
  if(pendFile[id]){it.att.push(pendFile[id]);delete pendFile[id];}
  delete openUpd[id];
  expH[id]=true;
  save();renderList();
}

function saveEdt(id){
  var t=document.getElementById('et-'+id);
  if(!t||!t.value.trim())return;
  var it=items.find(function(i){return i.id===id;});
  if(!it)return;
  it.txt=t.value.trim();
  var ti=document.getElementById('eti-'+id);if(ti)it.tipo=ti.value;
  var w=document.getElementById('ew-'+id);if(w)it.who=w.value.trim();
  var d=document.getElementById('ed-'+id);if(d)it.prazo=d.value;
  delete openEdt[id];
  save();render();
}

// ADD
function addItem(){
  var txt=document.getElementById('inp-txt').value.trim();
  if(!txt)return;
  items.unshift({id:uid(),txt:txt,tipo:document.getElementById('inp-tipo').value,who:document.getElementById('inp-who').value.trim(),prazo:document.getElementById('inp-dt').value,done:false,hist:[],att:[],dt:new Date().toISOString()});
  document.getElementById('inp-txt').value='';
  document.getElementById('inp-who').value='';
  document.getElementById('inp-dt').value='';
  save();render();
  document.getElementById('inp-txt').focus();
}
document.getElementById('btn-add').onclick=addItem;
document.getElementById('inp-txt').addEventListener('keydown',function(e){if(e.key==='Enter')addItem();});

// FORM TOGGLE
document.getElementById('btn-form').onclick=function(){
  var f=document.getElementById('form');
  var open=f.classList.contains('open');
  f.classList.toggle('open');
  document.getElementById('btn-form').classList.toggle('on',!open);
  if(!open)setTimeout(function(){document.getElementById('inp-txt').focus();},100);
};

// TABS
document.getElementById('tabs').onclick=function(e){
  var t=e.target.closest('.tab');if(!t)return;
  filter=t.dataset.f;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
  t.classList.add('on');
  renderList();
};

// FILTERS
document.getElementById('sel-who').onchange=function(e){fWho=e.target.value;renderList();};
document.getElementById('s-inp').oninput=function(e){sQ=e.target.value.trim();renderList();};
document.getElementById('s-sort').onchange=function(e){sSort=e.target.value;renderList();};

// EXPORT
document.getElementById('btn-exp').onclick=function(){
  var d={pendencias:items,em:new Date().toISOString(),v:'v9'};
  var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');
  a.href=u;a.download='pendencias-'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.json';
  a.click();URL.revokeObjectURL(u);
};

// IMPORT
document.getElementById('inp-imp').onchange=function(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      var imp=d.pendencias||d;
      if(!Array.isArray(imp)){alert('Arquivo inválido.');return;}
      if(!confirm('Importar '+imp.length+' pendências? Substitui os dados atuais.'))return;
      items=imp.map(function(i){return Object.assign({hist:[],att:[]},i);});
      save();render();
      alert('Importado! '+imp.length+' pendências.');
    }catch(err){alert('Erro ao ler arquivo.');}
  };
  r.readAsText(f);
  e.target.value='';
};

// VOICE
var recog=null;var listening=false;
var micBtn=document.getElementById('btn-mic');
if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.lang='pt-BR';recog.continuous=false;recog.interimResults=true;
  recog.onstart=function(){listening=true;micBtn.classList.add('on');document.getElementById('inp-txt').placeholder='Ouvindo...';};
  recog.onresult=function(e){document.getElementById('inp-txt').value=Array.from(e.results).map(function(r){return r[0].transcript;}).join('');};
  recog.onend=function(){listening=false;micBtn.classList.remove('on');document.getElementById('inp-txt').placeholder='O que está pendente?';};
  recog.onerror=function(e){listening=false;micBtn.classList.remove('on');document.getElementById('inp-txt').placeholder='O que está pendente?';if(e.error==='not-allowed')alert('Permita o microfone.');};
  micBtn.onclick=function(){if(listening)recog.stop();else{document.getElementById('inp-txt').value='';recog.start();}};
}else{micBtn.style.display='none';}

// AI
function openAI(title,prompt){
  document.getElementById('aip-title').textContent=title;
  document.getElementById('aip').classList.add('open');
  document.getElementById('aip-body').innerHTML='';
  aiMsgs=[];
  if(prompt)sendAI(prompt);
}
document.getElementById('aip-close').onclick=function(){document.getElementById('aip').classList.remove('open');};

document.getElementById('btn-brief').onclick=function(){
  var ab=items.filter(function(i){return !i.done;});
  var hoje=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  var p='Você é um assistente executivo pessoal. Hoje é '+hoje+'.\n\nPendências abertas:\n';
  p+=ab.length?ab.map(function(i){
    var ult=i.hist&&i.hist.length?' [último update: "'+i.hist[i.hist.length-1].txt+'"]':'';
    return '- ['+i.tipo.toUpperCase()+'] '+i.txt+(i.who?' ('+i.who+')')+(i.prazo?' prazo:'+fmtD(i.prazo)+(isLate(i.prazo)?' ATRASADO':'')+'')+ult;
  }).join('\n'):'Nenhuma.';
  p+='\n\nFaça meu briefing matinal. Destaque atrasados, o que cobrar de quem, e o que preciso fazer hoje. Tom executivo, direto. Máximo 200 palavras.';
  openAI('☀ Briefing do dia',p);
};

document.getElementById('btn-asst').onclick=function(){
  openAI('✦ Assistente',null);
  document.getElementById('aip-body').innerHTML='<p style="color:var(--tx2);font-size:14px;padding-top:8px;">Me pergunte qualquer coisa, ou diga:<br><br><span style="color:var(--tx3)">→ "O João me entregou o relatório"<br>→ "Quais estão atrasadas?"<br>→ "Me ajuda a priorizar hoje"</span></p>';
};

async function sendAI(msg){
  if(aiLoad)return;aiLoad=true;
  if(msg!=null)aiMsgs.push({role:'user',content:msg});
  var body=document.getElementById('aip-body');
  var ld=document.createElement('div');ld.className='aip-loading';ld.innerHTML='<div class="spin"></div><span>Pensando...</span>';
  body.appendChild(ld);body.scrollTop=body.scrollHeight;
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'Você é um assistente executivo pessoal. Seja direto, prático e humano. Fale português do Brasil. Evite bullet points.',messages:aiMsgs})});
    var data=await res.json();ld.remove();
    var reply=(data.content&&data.content[0]&&data.content[0].text)||'Não consegui processar.';
    aiMsgs.push({role:'assistant',content:reply});
    var div=document.createElement('div');div.className='ai-msg';
    div.innerHTML=reply.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    body.appendChild(div);body.scrollTop=body.scrollHeight;
  }catch(e){
    ld.remove();var err=document.createElement('div');
    err.style.cssText='color:var(--red);font-size:14px;padding:8px 0';
    err.textContent='Erro ao conectar.';body.appendChild(err);
  }
  aiLoad=false;
}

document.getElementById('btn-snd').onclick=function(){
  var inp=document.getElementById('aip-inp');var msg=inp.value.trim();
  if(!msg||aiLoad)return;inp.value='';
  var body=document.getElementById('aip-body');
  var d=document.createElement('div');d.className='usr-msg';d.textContent='→ '+msg;
  body.appendChild(d);sendAI(msg);
};
document.getElementById('aip-inp').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('btn-snd').click();});

load();render();
